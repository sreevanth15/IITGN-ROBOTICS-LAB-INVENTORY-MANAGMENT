<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IITGN Robotics Lab - Inventory Management System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>🤖 IITGN Robotics Lab</h1>
            <p class="subtitle">Inventory Management System</p>
            
            <div class="error-message"></div>
            <div class="success-message"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="btn btn-primary">
                    Sign In
                </button>
            </form>
            
            <div class="demo-info" style="margin-top: 20px; padding: 15px; background-color: #f3f4f6; border-radius: 6px; font-size: 13px; text-align: center;">
            </div>
        </div>
    </div>
    
    <script src="/js/app.js"></script>
</body>
</html>
